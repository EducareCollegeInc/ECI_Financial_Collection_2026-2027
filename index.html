<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Financial Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; }
        .form-container { max-width: 550px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-top: 8px solid #004085; transition: border-top 0.3s; }
        /* Shift to Red when Cash Out is selected */
        .form-container.cash-out { border-top-color: #dc3545; }
        h1 { text-align: center; color: #004085; margin-bottom: 10px; font-weight: 1000}
        h2 { text-align: center; color: #004085; margin-bottom: 20px; }
        .cash-out h2 { color: #dc3545; }
        
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; color: #495057; font-size: 13px; }
        input, select { padding: 12px; border: 1px solid #ced4da; border-radius: 5px; font-size: 14px; }
        .extra-input { margin-top: 10px; display: none; }
        
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 2; padding: 15px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-submit { background-color: #004085; }
        .cash-out .btn-submit { background-color: #dc3545; }
        .btn-clear { flex: 1; background-color: #6c757d; }
        
        #successMessage { display:none; background-color: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 20px; text-align: center; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div class="form-container" id="container">
    <h1>Educare College Inc.</h1>
    <h2 id="formTitle">Financial Collection</h2>
    
    <div id="successMessage">Successful Data Entry</div>

    <form id="collectionForm" action="https://script.google.com/macros/s/AKfycbyq9v0cgTbe_EMcv2M2c-11aEiEzVdpoWDbBi0mNhpJX7nABCrAsP7fxJT7U72ahP7cDg/exec" method="POST">
        
        <!-- Transaction Type Switch -->
        <div class="field" style="margin-bottom: 20px;">
            <label>Transaction Type</label>
            <select name="TransactionType" id="transType" onchange="updateFormMode()">
                <option value="Collection">Collection (Income)</option>
                <option value="Cash Out">Cash Out (Expense)</option>
            </select>
        </div>

        <div class="row">
            <div class="field">
                <label>Service Invoice No.</label>
                <input type="text" name="InvoiceNo" id="invoiceNo" required>
            </div>
            <div class="field">
                <label>Date</label>
                <input type="date" name="Date" id="date" required>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Name (Student/Payee)</label>
                <input type="text" name="Name" required>
            </div>
            <div class="field">
                <label>Grade Level</label>
                <select name="GradeLevel">
                    <option value="N/A">N/A (For Cash Out)</option>
                    <option value="Kinder">Kinder</option>
                    <option value="Grade 1">Grade 1</option>
                    <option value="Grade 2">Grade 2</option>
                    <option value="Grade 3">Grade 3</option>
                    <option value="Grade 4">Grade 4</option>
                    <option value="Grade 5">Grade 5</option>
                    <option value="Grade 6">Grade 6</option>
                    <option value="Grade 7">Grade 7</option>
                    <option value="Grade 8">Grade 8</option>
                    <option value="Grade 9">Grade 9</option>
                    <option value="Grade 10">Grade 10</option>
                    <option value="Grade 11">Grade 11</option>
                    <option value="Grade 12">Grade 12</option>
                </select>
            </div>
        </div>

        <div class="field" style="margin-bottom: 15px;">
            <label>Description</label>
            <select id="descSelect" onchange="toggleOthers('descSelect', 'descOtherCont', 'descFinal')">
                <option value="Tuition Fee">Tuition Fee</option>
                <option value="Miscellaneous Fee">Miscellaneous Fee</option>
                <option value="Books">Books</option>
                <option value="Others">Others</option>
            </select>
            <div id="descOtherCont" class="extra-input">
                <input type="text" id="descOtherInput" placeholder="Specify description..." oninput="sync('descOtherInput', 'descFinal')">
            </div>
            <input type="hidden" name="Description" id="descFinal" value="Tuition Fee">
        </div>

        <div class="row">
            <div class="field">
                <label>Amount</label>
                <input type="number" name="Amount" id="amountInput" step="0.01" required>
            </div>
            <div class="field">
    <label>Mode of Payment</label>
    <!-- Put the name directly on the select -->
    <select name="ModeOfPayment" id="modeSelect" onchange="toggleOthers('modeSelect', 'modeOtherCont', 'modeOtherInput')">
        <option value="Cash">Cash</option>
        <option value="GCash">GCash</option>
        <option value="BPI">BPI</option>
        <option value="Landbank">Landbank</option>
        <option value="Others">Others</option>
    </select>
    
    <div id="modeOtherCont" class="extra-input">
        <input type="text" id="modeOtherInput" placeholder="Specify mode...">
    </div>
</div>

        </div>

        <div class="field">
            <label>Received/Authorized By</label>
            <input type="text" name="ReceivedBy" required>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-submit" id="submitBtn">Submit Entry</button>
            <button type="button" class="btn-clear" onclick="location.reload()">Clear</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();

    function updateFormMode() {
        const type = document.getElementById('transType').value;
        const container = document.getElementById('container');
        const title = document.getElementById('formTitle');
        if (type === "Cash Out") {
            container.classList.add('cash-out');
            title.innerText = "Financial Cash Out";
        } else {
            container.classList.remove('cash-out');
            title.innerText = "Financial Collection";
        }
    }

    function toggleOthers(sId, cId, hId) {
        const sel = document.getElementById(sId);
        const cont = document.getElementById(cId);
        const hid = document.getElementById(hId);
        if(sel.value === 'Others') {
            cont.style.display = 'block';
            hid.value = '';
        } else {
            cont.style.display = 'none';
            hid.value = sel.value;
        }
    }

    function sync(iId, hId) { document.getElementById(hId).value = document.getElementById(iId).value; }

  const form = document.getElementById('collectionForm');

form.addEventListener('submit', e => {
    e.preventDefault();
    
    const formData = new FormData(form);
    const modeSelect = document.getElementById('modeSelect');
    const modeOtherInput = document.getElementById('modeOtherInput');

    // If 'Others' is selected, override the 'ModeOfPayment' value with the text input
    if (modeSelect.value === 'Others') {
        formData.set('ModeOfPayment', modeOtherInput.value);
    }

        // Logic to make amount negative if Cash Out
        const amountField = document.getElementById('amountInput');
        const originalValue = amountField.value;
        if(document.getElementById('transType').value === "Cash Out") {
            amountField.value = -Math.abs(amountField.value);
        }

        // Now proceed with your fetch call using the updated formData
    fetch(form.action, {
        method: 'POST',
        body: formData,
        mode: 'no-cors'
    })
        .then(() => {
            successMsg.style.display = 'block';
            form.reset();
            document.getElementById('date').valueAsDate = new Date();
            updateFormMode();
            submitBtn.disabled = false;
            submitBtn.innerHTML = "Submit Entry";
            setTimeout(() => { successMsg.style.display = 'none'; }, 4000);
        })
        .catch(err => {
            alert("Error saving data.");
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
