<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Financial Portal - Educare College Inc.</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; }
        .form-container { max-width: 550px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-top: 8px solid #004085; transition: border-top 0.3s; }
        .form-container.cash-out { border-top-color: #dc3545; }
        h1 { text-align: center; color: #004085; margin-bottom: 5px; font-weight: 800; font-size: 24px; }
        h2 { text-align: center; color: #004085; margin-bottom: 20px; font-size: 18px; margin-top: 0; }
        .cash-out h2 { color: #dc3545; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; color: #495057; font-size: 13px; }
        input, select { padding: 12px; border: 1px solid #ced4da; border-radius: 5px; font-size: 14px; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #004085; box-shadow: 0 0 5px rgba(0,64,133,0.2); }
        .extra-input { margin-top: 10px; display: none; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 2; padding: 15px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-submit { background-color: #004085; }
        .cash-out .btn-submit { background-color: #dc3545; }
        .btn-clear { flex: 1; background-color: #6c757d; }
        #successMessage { display:none; background-color: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 20px; text-align: center; border: 1px solid #c3e6cb; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container" id="container">
    <h1>Educare College Inc.</h1>
    <h2 id="formTitle">Financial Collection</h2>
    
    <div id="successMessage">Successful Data Entry</div>

    <form id="collectionForm" action="https://script.google.com/macros/s/AKfycbyq9v0cgTbe_EMcv2M2c-11aEiEzVdpoWDbBi0mNhpJX7nABCrAsP7fxJT7U72ahP7cDg/exec" method="POST">
        
        <div class="field" style="margin-bottom: 20px;">
            <label>Transaction Type</label>
            <select name="TransactionType" id="transType" onchange="updateFormMode()">
                <option value="Collection">Collection (Income)</option>
                <option value="Cash Out">Cash Out (Expense)</option>
            </select>
        </div>

        <div class="row">
            <div class="field">
                <label>Service Invoice No.</label>
                <input type="text" name="InvoiceNo" id="invoiceNo" required>
            </div>
            <div class="field">
                <label>Date</label>
                <input type="date" name="Date" id="date" required>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Name (Student/Payee)</label>
                <input type="text" name="Name" required>
            </div>
            <div class="field">
                <label>Grade Level</label>
                <select name="GradeLevel">
                    <option value="N/A">N/A</option>
                    <option value="Kinder">Kinder</option>
                    <option value="Grade 1">Grade 1</option><option value="Grade 2">Grade 2</option>
                    <option value="Grade 3">Grade 3</option><option value="Grade 4">Grade 4</option>
                    <option value="Grade 5">Grade 5</option><option value="Grade 6">Grade 6</option>
                    <option value="Grade 7">Grade 7</option><option value="Grade 8">Grade 8</option>
                    <option value="Grade 9">Grade 9</option><option value="Grade 10">Grade 10</option>
                    <option value="Grade 11">Grade 11</option><option value="Grade 12">Grade 12</option>
                </select>
            </div>
        </div>

        <div class="field" style="margin-bottom: 15px;">
            <label>Description</label>
            <select name="Description" id="descSelect" onchange="toggleOthers('descSelect', 'descOtherCont', 'descOtherInput')">
                <option value="Tuition Fee">Tuition Fee</option>
                <option value="Miscellaneous Fee">Miscellaneous Fee</option>
                <option value="Books">Books</option>
                <option value="Others">Others</option>
            </select>
            <div id="descOtherCont" class="extra-input">
                <input type="text" id="descOtherInput" placeholder="Please specify description...">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Amount</label>
                <input type="number" name="Amount" id="amountInput" step="0.01" required>
            </div>
            <div class="field">
                <label>Mode of Payment</label>
                <select name="ModeOfPayment" id="modeSelect" onchange="toggleOthers('modeSelect', 'modeOtherCont', 'modeOtherInput')">
                    <option value="Cash">Cash</option>
                    <option value="GCash">GCash</option>
                    <option value="BPI">BPI</option>
                    <option value="Landbank">Landbank</option>
                    <option value="Others">Others</option>
                </select>
                <div id="modeOtherCont" class="extra-input">
                    <input type="text" id="modeOtherInput" placeholder="Please specify mode...">
                </div>
            </div>
        </div>

        <div class="field">
            <label>Received/Authorized By</label>
            <input type="text" name="ReceivedBy" required>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-submit" id="submitBtn">Submit Entry</button>
            <button type="button" class="btn-clear" onclick="location.reload()">Clear</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();

    function updateFormMode() {
        const type = document.getElementById('transType').value;
        const container = document.getElementById('container');
        const title = document.getElementById('formTitle');
        if (type === "Cash Out") {
            container.classList.add('cash-out');
            title.innerText = "Financial Cash Out";
        } else {
            container.classList.remove('cash-out');
            title.innerText = "Financial Collection";
        }
    }

    function toggleOthers(selectId, containerId, inputId) {
        const select = document.getElementById(selectId);
        const container = document.getElementById(containerId);
        const input = document.getElementById(inputId);
        if(select.value === 'Others') {
            container.style.display = 'block';
            input.required = true;
        } else {
            container.style.display = 'none';
            input.required = false;
            input.value = "";
        }
    }

    const form = document.getElementById('collectionForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMessage');
        const amountInput = document.getElementById('amountInput');
        const transType = document.getElementById('transType').value;

        submitBtn.disabled = true;
        submitBtn.innerHTML = "Processing...";

        let formData = new FormData(form);

        // Handle 'Others' for Description
        if (document.getElementById('descSelect').value === 'Others') {
            formData.set('Description', document.getElementById('descOtherInput').value);
        }

        // Handle 'Others' for Mode of Payment
        if (document.getElementById('modeSelect').value === 'Others') {
            formData.set('ModeOfPayment', document.getElementById('modeOtherInput').value);
        }

        // Make amount negative if Cash Out
        if(transType === "Cash Out") {
            formData.set('Amount', -Math.abs(amountInput.value));
        }

        fetch(form.action, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
        })
        .then(() => {
            successMsg.style.display = 'block';
            form.reset();
            document.getElementById('date').valueAsDate = new Date();
            updateFormMode();
            document.getElementById('descOtherCont').style.display = 'none';
            document.getElementById('modeOtherCont').style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.innerHTML = "Submit Entry";
            setTimeout(() => { successMsg.style.display = 'none'; }, 4000);
        })
        .catch(err => {
            alert("Error: Data not saved. Check your internet.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = "Submit Entry";
        });
    });
</script>

</body>
</html>
